services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    restart: unless-stopped

  website:
    build:
      context: ./frontend/website
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/website/.env.local
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    ports:
      - "3011:3011"
    env_file:
      - ./frontend/admin/.env.local
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: certafix
      POSTGRES_PASSWORD: certafix_dev
      POSTGRES_DB: certafix
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
